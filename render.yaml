services:
  - type: web
    name: investment-risk-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: OLLAMA_URL
        value: http://localhost:11434/api/generate
      - key: OLLAMA_MODEL
        value: llama3.2:3b
      - key: YFINANCE_REFRESH_PERIOD
        value: 1mo
      - key: MARKET_REFRESH_ENABLED
        value: true
      - key: MARKET_REFRESH_DAYS
        value: mon,tue,wed,thu,fri
      - key: MARKET_REFRESH_HOUR_UTC
        value: 22
      - key: MARKET_REFRESH_MINUTE_UTC
        value: 0
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: 480
      - key: DEMO_USER_EMAIL
        value: demo@example.com
      - key: DEMO_USER_PASSWORD
        sync: false
      - key: DEMO_USER_FULL_NAME
        value: Demo User
      - key: NOTIFICATION_REPORT_RECIPIENTS
        sync: false
